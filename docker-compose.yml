name: parkshare3d

services:
  postgres:
    image: postgres:17-alpine
    container_name: parkshare3d-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parkshare3d}
      POSTGRES_USER: ${POSTGRES_USER:-parkshare3d}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkshare3d}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - parkshare3d_network

  redis:
    image: redis:7-alpine
    container_name: parkshare3d-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - parkshare3d_network

networks:
  parkshare3d_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
